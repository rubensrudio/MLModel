<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">ML</div>
      <div>
        <strong>MLModel</strong>
        <span>Petrophysics Lab</span>
      </div>
    </div>

    <nav class="nav">
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a class="nav-item" routerLink="/samples" routerLinkActive="active">Samples</a>
      <a class="nav-item" routerLink="/rock-physics" routerLinkActive="active">Rock Physics</a>
      <a class="nav-item" routerLink="/model-runs" routerLinkActive="active">Model Runs</a>
    </nav>

    <div class="runtime">
      <span class="runtime-dot" [class.online]="health?.status === 'ok'"></span>
      <div>
        <strong>{{ health?.status === 'ok' ? 'Backend online' : 'Backend pending' }}</strong>
        <span>{{ health?.version || 'no version' }}</span>
      </div>
    </div>
  </aside>

  <main class="workspace">
    <router-outlet></router-outlet>
  </main>
</div>
